# =============================================================================
# Nav2 参数配置 — 哨兵巡航专用
# 整合了自定义插件:
#   - goal_approach_controller (目标减速控制器)
#   - costmap_intensity::ObstacleLayerIntensity (强度障碍物层)
#   - costmap_voxel::VoxelFilterLayer (体素滤波层)
#   - pb_nav2_behaviors::BackUpFreeSpace (避障后退行为)
# =============================================================================

sentry_eval_bt_node:
  ros__parameters:
    loop_points: true
    stop_on_last: false
    points: [
      -0.2, -6.5, 0.0,
      1.2, -6.5, 0.0,
      1.0, 0.5, 0.0,
      2.15, 0.6, 0.0,
      1.9, -6.5, 0.0,
      3.2, -6.5, 0.0,
      3.0, 0.5, 0.0,
      4.15, 0.6, 0.0,
      4.4, -5.8, 0.0
    ]

amcl:
  ros__parameters:
    use_sim_time: false
    alpha1: 0.2
    alpha2: 0.2
    alpha3: 0.2
    alpha4: 0.2
    alpha5: 0.2
    base_frame_id: "base_link"
    beam_skip_distance: 0.5
    beam_skip_error_threshold: 0.9
    beam_skip_threshold: 0.3
    do_beamskip: false
    global_frame_id: "map"
    lambda_short: 0.1
    laser_likelihood_max_dist: 2.0
    laser_max_range: 100.0
    laser_min_range: -1.0
    laser_model_type: "likelihood_field"
    max_beams: 60
    max_particles: 2000
    min_particles: 500
    odom_frame_id: "odom"
    pf_err: 0.05
    pf_z: 0.99
    recovery_alpha_fast: 0.0
    recovery_alpha_slow: 0.0
    resample_interval: 1
    robot_model_type: "nav2_amcl::DifferentialMotionModel"
    save_pose_rate: 0.5
    sigma_hit: 0.2
    tf_broadcast: true
    transform_tolerance: 1.0
    update_min_a: 0.2
    update_min_d: 0.25
    z_hit: 0.5
    z_max: 0.05
    z_rand: 0.5
    z_short: 0.05

map_server:
  ros__parameters:
    use_sim_time: false
    yaml_filename: ""
    topic_name: "/map"
    frame_id: "map"

# ----------------------------------
# 全局代价地图
# ----------------------------------
global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: false
      global_frame: map
      robot_base_frame: base_link
      robot_radius: 0.35
      resolution: 0.05
      track_unknown_space: true
      plugins: ["static_layer", "intensity_voxel_layer", "voxel_filter_layer", "inflation_layer"]
      obstacle_layer: # 保留占位使 Nav2 不报错
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: false
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: True
      intensity_voxel_layer:
        plugin: "pb_nav2_costmap_2d::IntensityVoxelLayer"
        enabled: true
        observation_sources: pointcloud
        pointcloud:
          topic: /filtered_cloud
          data_type: PointCloud2
          expected_update_rate: 10.0
          observation_persistence: 0.0
          marking: true
          clearing: true
          max_obstacle_height: 2.0
          min_obstacle_height: -0.1
          inf_is_valid: false
      voxel_filter_layer:
        plugin: "costmap_voxel::VoxelFilterLayer"
        enabled: true
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0
        inflation_radius: 0.55
      always_send_full_costmap: true

# ----------------------------------
# 局部代价地图
# ----------------------------------
local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: false
      global_frame: odom
      robot_base_frame: base_link
      robot_radius: 0.35
      resolution: 0.05
      width: 8.0
      height: 8.0
      rolling_window: true
      track_unknown_space: true
      plugins: ["intensity_voxel_layer", "voxel_filter_layer", "inflation_layer"]
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: false
      intensity_voxel_layer:
        plugin: "pb_nav2_costmap_2d::IntensityVoxelLayer"
        enabled: true
        observation_sources: pointcloud
        pointcloud:
          topic: /filtered_cloud
          data_type: PointCloud2
          expected_update_rate: 10.0
          observation_persistence: 0.0
          marking: true
          clearing: true
          max_obstacle_height: 2.0
          min_obstacle_height: -0.1
          inf_is_valid: false
      voxel_filter_layer:
        plugin: "costmap_voxel::VoxelFilterLayer"
        enabled: true
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0
        inflation_radius: 0.55
      always_send_full_costmap: true

# ----------------------------------
# 导航控制器 (使用自定义 goal_approach_controller 包裹 MPPI)
# ----------------------------------
controller_server:
  ros__parameters:
    use_sim_time: false
    controller_frequency: 20.0
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.5
    min_theta_velocity_threshold: 0.001
    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.5
      movement_time_allowance: 10.0
    goal_checker:
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.2
      yaw_goal_tolerance: 0.3
      stateful: True
    controller_plugins: ["FollowPath"]
    FollowPath:
      plugin: "goal_approach_controller::GoalApproachController"
      # 内部 MPPI 控制器参数
      goal_approach_threshold: 0.8
      goal_approach_linear_speed: 0.2
      inner_controller: "mppi"
      motion_model: "DiffDrive"
      # MPPI 参数
      time_steps: 30
      model_dt: 0.1
      batch_size: 500
      vx_max: 1.2
      vx_min: -0.1
      vy_max: 0.3
      vz_max: 0.0
      v_theta_max: 0.8
      v_theta_min: -0.8
      ax_max: 1.0
      ay_max: 0.0
      az_max: 0.0
      rotational_ax_max: 1.0
      temperature: 0.3
      use_sampling: true
      visualize: false
      # 权重
      motion_model_forward_weight: 1.0
      path_cost_weight: 4.0
      goal_cost_weight: 5.0
      goal_angle_cost_weight: 1.0
      goal_angle_cost_sliding_weight: 1.0
      prefer_forward_cost_weight: 0.0
      staying_cost_weight: 3.0
      obstacle_cost_weight: 6.0
      cost_function_plugins: [ "path_angle_cost_function", "path_follow_cost_function", "goal_cost_function", "goal_angle_cost_function", "obstacle_cost_function", "prefer_forward_cost_function", "staying_cost_function"]

# ----------------------------------
# 平滑器
# ----------------------------------
smoother_server:
  ros__parameters:
    use_sim_time: false
    smoother_plugins: ["simple_smoother"]
    simple_smoother:
      plugin: "nav2_smoother::SimpleSmoother"
      max_curvature: 0.3
      max_deviation: 0.3

# ----------------------------------
# 规划器
# ----------------------------------
planner_server:
  ros__parameters:
    use_sim_time: false
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_navfn_planner/NavfnPlanner"
      tolerance: 0.5
      use_astar: false
      allow_unknown: true

# ----------------------------------
# 行为服务器 (后退避障等)
# ----------------------------------
behavior_server:
  ros__parameters:
    use_sim_time: false
    local_costmap_topic: local_costmap/costmap_raw
    local_footprint_topic: local_costmap/published_footprint
    global_costmap_topic: global_costmap/costmap_raw
    global_footprint_topic: global_costmap/published_footprint
    cycle_frequency: 10.0
    behavior_plugins: ["spin", "backup", "drive_on_heading", "wait", "back_up_free_space"]
    spin:
      plugin: "nav2_behaviors/Spin"
    backup:
      plugin: "nav2_behaviors/BackUp"
    drive_on_heading:
      plugin: "nav2_behaviors/DriveOnHeading"
    wait:
      plugin: "nav2_behaviors/Wait"
    back_up_free_space:
      plugin: "pb_nav2_behaviors/BackUpFreeSpace"

# ----------------------------------
# BT Navigator (负责执行单个 navigate_to_pose 目标)
# sentry_eval_bt_node 通过 action client 发送每个路点至此
# ----------------------------------
bt_navigator:
  ros__parameters:
    use_sim_time: false
    global_frame: map
    robot_base_frame: base_link
    odom_topic: /odom
    bt_loop_duration: 100
    default_server_timeout: 20
    navigator_plugins: ["navigate_to_pose"]
    navigate_to_pose:
      plugin: "nav2_bt_navigator/NavigateToPoseNavigator"
    goal_blackboard_id: "goal"

# ----------------------------------
# Waypoint Follower
# ----------------------------------
waypoint_follower:
  ros__parameters:
    use_sim_time: false
    stop_on_failure: false
    waypoint_task_executor_plugin: "wait_at_waypoint"
    wait_at_waypoint:
      plugin: "nav2_waypoint_follower::WaitAtWaypoint"
      enabled: True
      waypoint_pause_duration: 0.0

# ----------------------------------
# Velocity Smoother
# ----------------------------------
velocity_smoother:
  ros__parameters:
    use_sim_time: false
    smoothing_frequency: 20.0
    scale_velocities: false
    feedback: "OPEN_LOOP"
    velocity_limits: [1.2, 0.3, 0.8]
    max_velocity: [1.2, 0.3, 0.8]
    min_velocity: [-0.1, -0.3, -0.8]
    max_accel: [1.5, 1.0, 1.5]
    max_decel: [1.5, 1.0, 1.5]
    odom_topic: "/odom"
    linear_limits: [0.0, 0.0]
