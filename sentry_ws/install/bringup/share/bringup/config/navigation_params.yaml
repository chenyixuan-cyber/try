# =======================================================================================
# Controller Server (控制器服务器) - 使用 MPPI 控制器
# =======================================================================================
controller_server:
  ros__parameters:
    use_sim_time: False
    controller_frequency: 20.0
    min_x_velocity_threshold: 0.05
    min_y_velocity_threshold: 0.05
    min_theta_velocity_threshold: 0.1
    failure_tolerance: 0.3 # 控制器插件允许失败的最大持续时间（秒）
    odom_topic: "state_estimation"
    progress_checker_plugin: "progress_checker"
    goal_checker_plugins: ["general_goal_checker"] 
    controller_plugins: ["FollowPath"]

    # ========================
    # 进度检查器参数
    # ========================
    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.05      # 认为“有进展”所需的最小位移半径（米）
      movement_time_allowance: 3.0        # 允许在该时间内没有明显移动（秒）

    # ========================
    # 目标检查器参数
    # ========================
    general_goal_checker:
      stateful: False
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.05              # 到达目标的平面位置容许误差（米）
      yaw_goal_tolerance: 3.14            # 到达目标的航向角容许误差（弧度）

    FollowPath:    
      plugin: "nav2_mppi_controller::MPPIController"

      # ========================
      # 姿态调整相关参数
      # ========================
      adjustThre: 14.0        # 当坡度角（slopeDegree）大于该值时，触发航向调整行为
      minAngleDiff: 365.0     # 当角度差大于该值时，机器人持续进行航向调整
      adjustHeadingSpeed: 0.2 # 调整航向时使用的角速度

      # ========================
      # MPPI 核心参数
      # ========================
      time_steps: 56          # 预测时间步数，预测时域 = time_steps × model_dt = 3 秒
      model_dt: 0.05          # 运动模型时间步长（≈ 1 / controller_frequency）
      batch_size: 2000        # 每次迭代随机采样的轨迹数量
                              # 50Hz 下 1000 条或 30Hz 下 2000 条通常效果较好
      vx_std: 0.5             # x 方向线速度采样标准差
      vy_std: 0.5             # y 方向线速度采样标准差
      wz_std: 0.1             # z 方向角速度采样标准差

      vx_max: 1.5             # 最大前向速度（m/s）
                              # 预测距离 = 预测时间 × vx_max = 3m
                              # 局部代价地图尺寸应 ≥ 6m
      vx_min: -1.5            # 最大倒退速度（m/s）
      vy_max: 1.5             # 最大侧向速度（m/s）
      vy_min: -1.5            # 最大侧向速度（m/s）
      wz_max: 0.35             # 最大角速度（rad/s）

      iteration_count: 1      # 迭代次数，推荐保持为 1，优先增大 batch_size
      prune_distance: 4.0     # 轨迹裁剪距离，与最大速度和预测时域相关
      transform_tolerance: 0.1 # TF 变换允许的时间误差（秒）
      temperature: 0.3        # 温度参数
                              # 0：选择最小代价轨迹
                              # 很大：对所有轨迹求平均，忽略代价
      gamma: 0.065            # 平滑性（大）与能耗（小）之间的权衡参数
      motion_model: "Omni"    # 运动模型（全向）
      visualize: false        # 是否可视化采样轨迹（开启会显著降低性能）
      reset_period: 1.0       # 无运动多长时间后重置优化器（Humble 版本）
      regenerate_noises: false
      retry_attempt_limit: 3  # 失败时软重置并尝试寻找可行轨迹的次数

      TrajectoryVisualizer:
        trajectory_step: 5    # 轨迹显示步进
        time_step: 3          # 时间步显示间隔

      # AckermannConstraints:
      #   min_turning_r: 0.2   # 阿克曼车辆最小转弯半径

      # ========================
      # 代价函数（Critics）
      # ========================
      critics: ["ObstaclesCritic", "GoalCritic", "PathAlignCritic", "PathFollowCritic", "TwirlingCritic"]

      GoalCritic:
        enabled: true
        cost_power: 1
        cost_weight: 5.0
        threshold_to_consider: 1.5 # 当机器人与目标距离大于该值时才考虑目标代价
                                   # 通常设置为预测距离，保证与路径跟随的平滑切换

      PreferForwardCritic:     # 偏好前进而非倒退
        enabled: false
        cost_power: 1
        cost_weight: 5.0
        threshold_to_consider: 1.5 # 距离目标小于该值后，允许倒退，由目标代价主导

      ObstaclesCritic:         # 若易撞到低矮障碍物，需先确认地形分析是否正确
        enabled: true
        cost_power: 1
        repulsion_weight: 0.2  # 排斥权重
                               # 膨胀半径越大，该值通常应越小
        critical_weight: 20.0  # 临界碰撞惩罚权重
        consider_footprint: false # 是否考虑机器人轮廓（开启会增加计算量）
        collision_cost: 10.0
        collision_margin_distance: 0.1 # 碰撞惩罚边界距离（米）
                                         # 建议 0.05~0.2
        near_goal_distance: 0.0 # 距离目标小于该值时不再受障碍物排斥
        inflation_radius: 0.4   # 障碍物膨胀半径（需与 inflation layer 一致）
        cost_scaling_factor: 10.0 # 膨胀代价指数衰减系数
        inflation_layer_name: ["local_inflation_layer","global_inflation_layer"]

      PathAlignCritic:
        enabled: true
        cost_power: 1
        cost_weight: 14.0
        max_path_occupancy_ratio: 0.05
        trajectory_point_step: 3
        threshold_to_consider: 1.5 # 距离目标小于该值后不再考虑路径对齐
        offset_from_furthest: 8    # 从最远路径点向后的偏移量
                                   # 推荐为最大投影距离的 ~30%

      PathFollowCritic:        # 鼓励沿路径前进
        enabled: true
        cost_power: 1
        cost_weight: 5.0
        offset_from_furthest: 4
        threshold_to_consider: 1.5 # 接近目标后由 GoalCritic 接管

      PathAngleCritic:         # 惩罚与路径夹角过大的轨迹
                                # 有助于在角度误差大时进行急转
        enabled: false
        cost_power: 1
        cost_weight: 2.0
        offset_from_furthest: 4
        threshold_to_consider: 1.5
        max_angle_to_furthest: 1.0
        mode: 0

      TwirlingCritic:
        enabled: true
        twirling_cost_power: 1
        twirling_cost_weight: 10.0

      # ========================
      # 备用：Regulated Pure Pursuit 控制器参数
      # ========================
      # plugin: "nav2_regulated_pure_pursuit_controller::RegulatedPurePursuitController"
      # desired_linear_vel: 0.5
      # lookahead_dist: 0.6
      # min_lookahead_dist: 0.3
      # max_lookahead_dist: 0.9
      # lookahead_time: 1.5
      # rotate_to_heading_angular_vel: 1.8
      # transform_tolerance: 0.1
      # use_velocity_scaled_lookahead_dist: false
      # min_approach_linear_velocity: 0.05
      # approach_velocity_scaling_dist: 0.6
      # use_collision_detection: true
      # max_allowed_time_to_collision_up_to_carrot: 1.0
      # use_regulated_linear_velocity_scaling: true
      # use_fixed_curvature_lookahead: false
      # curvature_lookahead_dist: 0.25
      # use_cost_regulated_linear_velocity_scaling: false
      # regulated_linear_scaling_min_radius: 0.9
      # regulated_linear_scaling_min_speed: 0.25
      # use_rotate_to_heading: false
      # allow_reversing: true
      # rotate_to_heading_min_angle: 0.785
      # max_angular_accel: 3.2
      # max_robot_pose_search_dist: 10.0

# ==========================
# Local Costmap
# ==========================
local_costmap:
  local_costmap:
    ros__parameters:
      update_frequency: 20.0
      publish_frequency: 20.0
      global_frame: "odom"
      robot_base_frame: "base_link"
      use_sim_time: false
      rolling_window: true
      width: 20
      height: 20
      resolution: 0.05
      robot_radius: 0.4
      # 关键点：插件列表必须在这里定义，覆盖默认值
      plugins: ["local_obstacle_layer", "local_inflation_layer"]

      local_obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        footprint_clearing_enabled: true
        max_obstacle_height: 3.0
        min_obstacle_height: -1.0
        combination_method: 1
        observation_sources: "pointcloud"
        pointcloud:
          topic: "/livox/lidar/pointcloud"
          data_type: "PointCloud2"
          clearing: true
          marking: true
          observation_persistence: 0.0
          expected_update_rate: 20.0
          obstacle_max_range: 15.0
          obstacle_min_range: 0.0
          raytrace_max_range: 8.0
          raytrace_min_range: 0.25
          max_obstacle_height: 2.0
          min_obstacle_height: -0.25

      local_inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 7.0
        inflation_radius: 0.25

# =======================================================================================
# Global Costmap (全局代价地图) - 用于全局路径规划
# =======================================================================================
global_costmap:
  global_costmap:
    ros__parameters:
      update_frequency: 1.0               # 地图更新频率 (Hz) - 比局部地图慢
      publish_frequency: 1.0              # 地图发布频率 (Hz)
      global_frame: map                   # 全局坐标系 - 在map系中构建
      robot_base_frame: base_link         # 机器人本体坐标系
      use_sim_time: false                  # 使用仿真时间
      resolution: 0.05                    # 地图分辨率 (m/cell)
      track_unknown_space: true           # 跟踪未知区域（用于探索）
      plugins: ["static_layer", "inflation_layer"]  # 层插件列表

      # ----- 静态层：加载静态地图 -----
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"       # 静态地图层插件
        map_subscribe_transient_local: True          # 使用可靠传输订阅地图

      # ----- 膨胀层：与局部地图配置相同 -----
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 2.0
        inflation_radius: 0.5

      always_send_full_costmap: True      # 始终发布完整地图

# =======================================================================================
# Map Server (地图服务器) - 加载和提供静态地图
# =======================================================================================
map_server:
  ros__parameters:
    use_sim_time: false                    # 使用仿真时间
    yaml_filename: ""                     # 地图YAML文件路径（由launch文件传入）

# =======================================================================================
# Planner Server (路径规划服务器) - 计算从起点到终点的全局路径
# =======================================================================================
planner_server:
  ros__parameters:
    expected_planner_frequency: 20.0      # 期望的规划频率 (Hz)
    use_sim_time: false                    # 使用仿真时间
    planner_plugins: ["GridBased"]        # 规划器插件列表

    # ----- GridBased 规划器：基于theta*的网格规划器 -----
    GridBased:
      plugin: "nav2_theta_star_planner/ThetaStarPlanner"     
      how_many_corners: 8
      w_euc_cost: 1.0
      w_traversal_cost: 2.0
      w_heuristic_cost: 1.0               

    # ===== 可选：SMAC Hybrid A* 规划器（适合全向轮）=====
    # SmacHybrid:
    #   plugin: "nav2_smac_planner/SmacPlannerHybrid"
    #   tolerance: 0.5                    # 目标容差 (m)
    #   motion_model_for_search: "REEDS_SHEPP"  # 运动模型：Reeds-Shepp曲线
    #   allow_unknown: false               # 允许未知区域

# =======================================================================================
# Smoother Server (路径平滑服务器) - 对全局路径进行平滑处理
# =======================================================================================
smoother_server:
  ros__parameters:
    use_sim_time: false                    # 使用仿真时间
    smoother_plugins: ["simple_smoother"] # 平滑器插件列表

    # ----- 简单平滑器：基于优化的路径平滑 -----
    simple_smoother:
      plugin: "nav2_smoother::SimpleSmoother"        # 简单平滑器插件
      tolerance: 1.0e-10                  # 优化收敛容差
      max_its: 1000                       # 最大迭代次数
      do_refinement: True                 # 进行细化优化

# =======================================================================================
# Behavior Server (行为服务器) - 提供恢复行为（如原地旋转、后退等）
# =======================================================================================
behavior_server:
  ros__parameters:
    costmap_topic: local_costmap/costmap_raw        # 使用的代价地图话题
    footprint_topic: local_costmap/published_footprint  # 机器人轮廓话题
    cycle_frequency: 10.0                 # 行为执行频率 (Hz)
    
    # ===== 行为插件列表 =====
    behavior_plugins: [
      "spin",              # 原地旋转
      "backup",            # 后退
      "drive_on_heading",  # 沿固定方向前进
      "strafe",            # 横向移动 ← 全向轮特有
      "assisted_teleop",   # 辅助手动控制
      "wait"               # 等待
    ]

    # ----- 各行为插件配置 -----
    spin:
      plugin: "nav2_behaviors/Spin"                  # 原地旋转行为
    backup:
      plugin: "nav2_behaviors/BackUp"                # 后退行为
    drive_on_heading:
      plugin: "nav2_behaviors/DriveOnHeading"        # 定向行驶行为
    strafe:
      plugin: "nav2_behaviors/DriveOnHeading"        # 横向移动（复用定向行驶）
    wait:
      plugin: "nav2_behaviors/Wait"                  # 等待行为
    assisted_teleop:
      plugin: "nav2_behaviors/AssistedTeleop"        # 辅助遥控行为

    # ----- 行为通用参数 -----
    global_frame: odom                    # 全局坐标系
    robot_base_frame: base_link           # 机器人坐标系
    transform_tolerance: 1.5               # TF变换容差 (s)
    use_sim_time: false                    # 使用仿真时间
    simulate_ahead_time: 2.0              # 前瞻仿真时间 (s)
    max_rotational_vel: 1.0               # 最大旋转速度 (rad/s)
    min_rotational_vel: 0.4               # 最小旋转速度 (rad/s)
    rotational_acc_lim: 3.2               # 旋转加速度限制 (rad/s²)

# =======================================================================================
# BT Navigator (行为树导航器) - 协调整个导航流程
# =======================================================================================
bt_navigator:
  ros__parameters:
    use_sim_time: false
    global_frame: map
    robot_base_frame: base_link
    odom_topic: /odom
    bt_loop_duration: 10                  # 行为树循环周期 (ms)
    default_server_timeout: 20            # 默认服务超时 (s)
    
    # ===== 行为树 XML 文件路径 =====
    # 留空使用默认行为树
    default_nav_to_pose_bt_xml: "/opt/ros/humble/share/nav2_bt_navigator/behavior_trees/navigate_to_pose_w_replanning_and_recovery.xml"
    default_nav_through_poses_bt_xml: "/opt/ros/humble/share/nav2_bt_navigator/behavior_trees/navigate_through_poses_w_replanning_and_recovery.xml"
    
    # ===== 导航插件列表 =====
    plugin_lib_names:
    - nav2_compute_path_to_pose_action_bt_node
    - nav2_compute_path_through_poses_action_bt_node
    - nav2_smooth_path_action_bt_node
    - nav2_follow_path_action_bt_node
    - nav2_spin_action_bt_node
    - nav2_wait_action_bt_node
    - nav2_assisted_teleop_action_bt_node
    - nav2_back_up_action_bt_node
    - nav2_drive_on_heading_bt_node
    - nav2_clear_costmap_service_bt_node
    - nav2_is_stuck_condition_bt_node
    - nav2_goal_reached_condition_bt_node
    - nav2_goal_updated_condition_bt_node
    - nav2_globally_updated_goal_condition_bt_node
    - nav2_is_path_valid_condition_bt_node
    - nav2_initial_pose_received_condition_bt_node
    - nav2_reinitialize_global_localization_service_bt_node
    - nav2_rate_controller_bt_node
    - nav2_distance_controller_bt_node
    - nav2_speed_controller_bt_node
    - nav2_truncate_path_action_bt_node
    - nav2_truncate_path_local_action_bt_node
    - nav2_goal_updater_node_bt_node
    - nav2_recovery_node_bt_node
    - nav2_pipeline_sequence_bt_node
    - nav2_round_robin_node_bt_node
    - nav2_transform_available_condition_bt_node
    - nav2_time_expired_condition_bt_node
    - nav2_path_expiring_timer_condition
    - nav2_distance_traveled_condition_bt_node
    - nav2_single_trigger_bt_node
    - nav2_goal_updated_controller_bt_node
    - nav2_is_battery_low_condition_bt_node
    - nav2_navigate_through_poses_action_bt_node
    - nav2_navigate_to_pose_action_bt_node
    - nav2_remove_passed_goals_action_bt_node
    - nav2_planner_selector_bt_node
    - nav2_controller_selector_bt_node
    - nav2_goal_checker_selector_bt_node
    - nav2_controller_cancel_bt_node
    - nav2_path_longer_on_approach_bt_node
    - nav2_wait_cancel_bt_node
    - nav2_spin_cancel_bt_node
    - nav2_back_up_cancel_bt_node
    - nav2_assisted_teleop_cancel_bt_node
    - nav2_drive_on_heading_cancel_bt_node
    
    # ===== 错误代码映射 =====
    error_code_names:
    - compute_path_error_code
    - follow_path_error_code

# =======================================================================================
# Velocity Smoother (速度平滑器) - 平滑速度命令，避免突变
# =======================================================================================
velocity_smoother:
  ros__parameters:
    use_sim_time: False                    # 使用仿真时间
    smoothing_frequency: 100.0             # 平滑频率 (Hz)
    scale_velocities: False               # 不按比例缩放速度
    feedback: "OPEN_LOOP"                 # 闭环反馈（依赖里程计）
    
    # ===== 全向轮速度限制 [vx, vy, vtheta] =====
    max_velocity: [1.0, 1.0, 2.0]         # 最大速度 [m/s, m/s, rad/s]
    min_velocity: [-1.0, -1.0, -2.0]      # 最小速度 ← 允许负值（倒退/横移）
    
    max_accel: [2.0, 2.0, 3.2]            # 最大加速度 [m/s², m/s², rad/s²]
    max_decel: [-2.0, -2.0, -3.2]         # 最大减速度 [m/s², m/s², rad/s²]
    
    odom_topic: "odom"                    # 里程计话题（用于速度反馈）
    odom_duration: 0.1                    # 里程计数据有效时长 (s)
    deadband_velocity: [0.1, 0.1, 0.1]    # 死区速度（低于此值设为0）
    velocity_timeout: 1.0                 # 速度命令超时时间 (s)

# =======================================================================================
# Waypoint Follower (路径点跟随器) - 依次访问多个目标点
# =======================================================================================
waypoint_follower:
  ros__parameters:
    use_sim_time: false                    # 使用仿真时间
    loop_rate: 20                         # 循环频率 (Hz)
    stop_on_failure: false                # 失败时不停止（继续下一个点）
    waypoint_task_executor_plugin: "wait_at_waypoint"  # 到达路径点后的任务

    # ----- 等待任务：到达路径点后等待 -----
    wait_at_waypoint:
      plugin: "nav2_waypoint_follower::WaitAtWaypoint"   # 等待插件
      enabled: True                       # 启用
      waypoint_pause_duration: 200        # 等待时长 (ms)

# =======================================================================================
# Lifecycle Managers (生命周期管理器) - 管理节点的启动/关闭
# =======================================================================================

# ----- 导航栈生命周期管理器 -----
lifecycle_manager_navigation:
  ros__parameters:
    use_sim_time: false                    # 使用仿真时间
    autostart: True                       # 自动启动所有节点
    node_names: [                         # 管理的节点列表
      'controller_server',                # 控制器服务器
      'smoother_server',                  # 平滑器服务器
      'planner_server',                   # 规划器服务器
      'behavior_server',                  # 行为服务器
      'bt_navigator',                     # 行为树导航器
      'waypoint_follower',                # 路径点跟随器
      'velocity_smoother'                 # 速度平滑器
    ]

# ----- 定位栈生命周期管理器 -----
lifecycle_manager_localization:
  ros__parameters:
    use_sim_time: false                    # 使用仿真时间
    autostart: True                       # 自动启动
    node_names: ['map_server']            # 只管理地图服务器

# =======================================================================================
# Robot State Publisher (机器人状态发布器) - 发布机器人TF树
# =======================================================================================
robot_state_publisher:
  ros__parameters:
    use_sim_time: false                   