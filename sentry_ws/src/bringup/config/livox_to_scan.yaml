livox_to_scan_node:
  ros__parameters:
    # 高度过滤参数（米）
    min_height: 0.05
    max_height: 0.5
    
    # 角度范围参数（弧度）
    angle_min: -3.14159265359  # -180度
    angle_max: 3.14159265359   # 180度
    angle_increment: 0.005     # 约 0.286 度
    
    # 距离过滤参数（米）
    range_min: 0.1
    range_max: 100.0
    
    # 扫描时间参数（秒）
    scan_time: 0.1
    
    # 目标坐标系（固定参考系，用于消除雷达旋转影响）
    target_frame: "base_link"
    
    # 话题名称
    input_topic: "/livox/lidar"
    output_topic: "/scan"
    
    # 队列大小
    queue_size: 50
    
    # 调试：每帧打印多少个点的详细信息（0 表示不打印）
    debug_points: 0