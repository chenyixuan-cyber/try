# =============================================================================
# Lightning 定位初始位姿
# 注意：需要根据机器人实际启动位置修改下面坐标！
# 如果机器人不在 (0,0) 附近，Lightning 的全局定位（init_with_fp）仍可能自初始化，
# 但给一个接近真实位置的初始位姿能加快定位收敛速度。
# 参考路点坐标范围: x -0.2 ~ 4.4, y -6.5 ~ 0.6
# =============================================================================
start_pose:
  red:
    x: 0.0
    y: 0.0
    z: 0.0
    yaw_deg: 0.0
    pitch_deg: 0.0
    roll_deg: 0.0
  blue:
    x: 0.0
    y: 0.0
    z: 0.0
    yaw_deg: 0.0
    pitch_deg: 0.0
    roll_deg: 0.0
