# 针对NCLT的配置
common:
  dataset: "nclt"
  lidar_topic: "none"
  livox_lidar_topic: "/livox/lidar"
  imu_topic: "/livox/imu"

# fasterlio 参数
fasterlio:
  lidar_type: 1                # 1 for Livox serials LiDAR, 2 for Velodyne LiDAR, 3 for ouster LiDAR,
  scan_line: 40
  blind: 0.5                # 盲区，小于盲区距离的不会处理
  time_scale: 1e-3             # 兼容不同数据集的时间单位，仅对Velodyne LiDAR(lidar_type=2)生效

  skip_lidar_num: 0 # 点云的跳帧情况
  point_filter_num: 10 # 点云采样参数
  max_iteration: 6 # 最大迭代次数
  filter_size_scan: 0.5 # 对scan进行的降采样
  filter_size_map: 0.5

  ivox_grid_resolution: 0.5        # default=0.2
  ivox_nearby_type: 18             # 6, 18, 26
  esti_plane_threshold: 0.1        # default=0.1

  use_aa: true  # use anderson-acceleration

  acc_cov: 0.1
  gyr_cov: 0.1
  b_acc_cov: 0.0001
  b_gyr_cov: 0.0001
  extrinsic_est_en: false      # true: enable the online estimation of IMU-LiDAR extrinsic
  extrinsic_T: [ -0.011, -0.02329, 0.04412 ]
  extrinsic_R: [ 1, 0, 0,
                 0, 1, 0,
                 0, 0, 1 ]
  keep_first_imu_estimation: false


g2p5:
  esti_floor: false   # 是否动态估计地面
  lidar_height: 0.0   # 雷达安装高度
  floor_height: -0.23   # 默认地面高度
  min_th_floor: 0.05  # 距离地面这个高度的障碍物被扫入栅格地图中
  max_th_floor: 1.0  # 距离地面这个高度的障碍物被扫入栅格地图中
  grid_map_resolution: 0.1 # 栅格地图分辨率

system:
  with_loop_closing: true # 是否需要回环检测
  with_ui: true # 是否需要3D UI
  with_2dui: false # 是否需要2D UI
  with_g2p5: false # 是否需要栅格地图
  step_on_kf: false # 是否在关键帧处暂停

  enable_lidar_loc_skip: false
  enable_lidar_loc_rviz: false
  enable_lidar_odom_skip: false
  lidar_loc_skip_num: 4
  lidar_odom_skip_num: 2
  map_path: ./data/new_map/
  pub_tf: false

loop_closing:
  loop_kf_gap: 20       # 每隔多少个关键帧检查一次
  min_id_interval: 20   # 被检查的关键帧ID间隔
  closest_id_th: 50     # 历史关键帧与当前帧的ID间隔
  max_range: 30.0       # 候选帧的最大距离
  ndt_score_th: 1.0     # ndt位姿分值
  with_height: true


### 激光雷达定位参数 ================================================================================================
lidar_loc:
  enable_dynamic_polygon: false      # 是否启用动态多边形区域检测
  enable_parking_static: true        # 是否在停车时保持静态（不更新位姿）
  enable_icp_adjust: true           # 是否启用ICP微调功能
  filter_intensity_max: 100.0        # 点云强度过滤最大值
  filter_intensity_min: 10.0         # 点云强度过滤最小值
  filter_z_max: 30.0                 # 点云Z轴（高度）过滤最大值
  filter_z_min: -1.0                 # 点云Z轴（高度）过滤最小值
  force_2d: false                    # 是否强制2D定位（忽略Z轴和俯仰角、翻滚角）
  grid_search_angle_range: 180.0     # 网格搜索的角度范围（度）
  grid_search_angle_step: 60         # 网格搜索的角度步长（度）
  lidar_loc_odom_th: 0.5             # 激光雷达定位与里程计的阈值（米）
  init_with_fp: true                 # 是否使用指纹（fingerprint）初始化
  min_init_confidence: 1.8           # 初始化最小置信度阈值
  update_dynamic_cloud: true         # 是否更新动态点云
  update_err_h: 0.2                  # 水平方向更新误差阈值（米）
  update_err_v: 0.2                  # 垂直方向更新误差阈值（米）
  update_kf_dis: 2.0                 # 关键帧更新距离阈值（米）
  update_lidar_loc_score: 2.5        # 激光雷达定位分数更新阈值

### 地图管理参数 ================================================================================================
maps:
  delete_when_unload: false          # 卸载地图时是否删除
  dyn_cloud_policy: persistent       # 动态点云策略（persistent: 持久化）
  load_dyn_cloud: true               # 是否加载动态点云
  load_map_size: 2                   # 加载地图的大小范围（相对于当前位置的地图块数量）
  max_pts_dyn_chunk: 100000          # 每个动态点云块的最大点数
  save_dyn_when_quit: true           # 退出时是否保存动态点云
  save_dyn_when_unload: false        # 卸载地图时是否保存动态点云
  unload_map_size: 4                 # 卸载地图的大小范围（相对于当前位置的地图块数量）
  with_dyn_area: false               # 是否使用动态区域

### 位姿图优化（PGO）参数 ================================================================================================
pgo:
  dr_ang_noise: 0.5                  # 航位推算（Dead Reckoning）角度噪声（度）
  dr_pos_noise: 1.0                  # 航位推算位置噪声（米）
  dr_pos_noise_ratio: 1.0            # 航位推算位置噪声比率
  lidar_loc_ang_noise: 1.0           # 激光雷达定位角度噪声（度）
  lidar_loc_outlier_th: 5.0          # 激光雷达定位离群值阈值（米）
  lidar_loc_pos_noise: 0.3           # 激光雷达定位位置噪声（米）
  lidar_odom_ang_noise: 1.0          # 激光雷达里程计角度噪声（度）
  lidar_odom_pos_noise: 0.3          # 激光雷达里程计位置噪声（米）
  pgo_frame_converge_ang_th: 1.0     # PGO帧收敛角度阈值（度）
  pgo_frame_converge_pos_th: 0.05    # PGO帧收敛位置阈值（米）
  rtk_fix_ang_noise: 2.0             # RTK固定解角度噪声（度）
  rtk_fix_pos_noise: 1.0             # RTK固定解位置噪声（米）
  rtk_height_noise_ratio: 10.0       # RTK高度噪声比率
  rtk_other_ang_noise: 10.0          # RTK其他解（浮点解/单点解）角度噪声（度）
  rtk_other_pos_noise: 5.0           # RTK其他解位置噪声（米）
  rtk_outlier_th: 1.0                # RTK离群值阈值（米）
  smooth_factor: 0.01                # 平滑因子（用于优化过程的正则化）

### 感兴趣区域（ROI）参数 ================================================================================================
roi:
  height_max: 0.5                    # 感兴趣区域最大高度（米）
  height_min: -2.0                   # 感兴趣区域最小高度（米）
  range_max: 70                      # 感兴趣区域最大距离（米）
  range_min: 3.0                     # 感兴趣区域最小距离（米）

### UI可视化参数 ================================================================================================
ui:
  car_length: 2.0                    # 车辆长度（米），用于可视化
  car_width: 1.6                     # 车辆宽度（米），用于可视化
  car_height: 1.7                    # 车辆高度（米），用于可视化
  scans: 1                           # 显示的扫描帧数
